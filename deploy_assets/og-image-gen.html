<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #1a1040 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #e6edf3;
  overflow: hidden;
  position: relative;
}
/* Decorative circles */
.circle1 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 70%);
  top: -100px; right: -50px;
}
.circle2 {
  position: absolute; width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
  bottom: -80px; left: -40px;
}
.circle3 {
  position: absolute; width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(63,185,80,0.12), transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; padding: 60px 80px; text-align: center;
}
.emoji-icon {
  font-size: 72px; margin-bottom: 20px;
  filter: drop-shadow(0 4px 20px rgba(124,58,237,0.4));
}
h1 {
  font-size: 56px; font-weight: 800;
  background: linear-gradient(135deg, #e6edf3, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px; line-height: 1.1;
}
.subtitle {
  font-size: 24px; color: #8b949e; margin-bottom: 32px;
  max-width: 700px; line-height: 1.4;
}
.badges {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 8px; font-size: 16px; font-weight: 600;
}
.badge-green {
  background: rgba(63,185,80,0.15); border: 1px solid rgba(63,185,80,0.3);
  color: #3fb950;
}
.badge-blue {
  background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3);
  color: #58a6ff;
}
.badge-purple {
  background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
  color: #a78bfa;
}
.footer-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px 40px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 14px; color: #8b949e;
}
.footer-bar a { color: #7c3aed; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>
  <div class="content">
    <div class="emoji-icon">💰</div>
    <h1>Daily Expense Tracker</h1>
    <p class="subtitle">100% free, open-source expense tracking with charts, categories, recurring rules & CSV export</p>
    <div class="badges">
      <span class="badge badge-green">🔓 Free & Open Source</span>
      <span class="badge badge-blue">📊 Charts & Analytics</span>
      <span class="badge badge-purple">🔄 Recurring Rules</span>
    </div>
  </div>
  <div class="footer-bar">
    <span>No signup · No tracking · No ads</span>
    <span>github.com/adbhutrd/expense-tracker</span>
  </div>
</body>
</html>
