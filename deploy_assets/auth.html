<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — FTMO Tracker Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --text-muted: #8b949e;
  --accent: #7c3aed; --green: #2ea043; --blue: #58a6ff;
  --gradient: linear-gradient(135deg, #7c3aed, #58a6ff);
  --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px 36px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.auth-card h1 {
  font-size: 24px; font-weight: 700; text-align: center;
  background: var(--gradient); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; margin-bottom: 8px;
}
.auth-card .subtitle {
  text-align: center; color: var(--text-muted); font-size: 14px;
  margin-bottom: 28px;
}
.tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.tab {
  flex: 1; padding: 12px; text-align: center; cursor: pointer;
  font-size: 14px; font-weight: 600; transition: all 0.2s;
  background: var(--bg); color: var(--text-muted); border: none;
}
.tab.active { background: var(--accent); color: white; }
.tab:not(.active):hover { color: var(--text); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.form-group input {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--accent); }
.btn {
  display: block; width: 100%;
  padding: 14px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--gradient); color: white; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-outline {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  margin-top: 8px;
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text-muted); font-size: 13px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.error { color: #da3633; font-size: 13px; margin-top: 12px; text-align: center; }
.success { color: var(--green); font-size: 13px; margin-top: 12px; text-align: center; }
.hidden { display: none; }
.back-link {
  display: block; text-align: center; margin-top: 16px;
  color: var(--text-muted); font-size: 13px; text-decoration: none;
}
.back-link:hover { color: var(--accent); }
.alert {
  padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  line-height: 1.5;
}
.alert-info { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--blue); }
</style>
</head>
<body>
<div class="auth-card" id="app">
  <h1>FTMO Tracker Pro</h1>
  <p class="subtitle">Sign in to sync your data across all devices</p>

  <!-- Magic Link Sent Message -->
  <div id="magicSent" class="hidden">
    <div class="alert alert-info">📬 <strong>Check your email!</strong><br>We sent you a magic link. Click it to sign in.</div>
    <button class="btn btn-outline" onclick="showLogin()">← Back to login</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="tabs">
      <button class="tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="loginPanel">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
      <button class="btn btn-outline" onclick="handleMagicLink()">📬 Send Magic Link Instead</button>
      <div id="loginError" class="error hidden"></div>
    </div>

    <div id="signupPanel" class="hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="handleSignup()">Create Account</button>
      <div id="signupError" class="error hidden"></div>
      <div id="signupSuccess" class="success hidden">✅ Account created! Check your email to confirm.</div>
    </div>
  </div>

  <a href="ftmo_challenge_tracker.html" class="back-link">← Continue without signing in</a>
</div>

<script src="supabase-client.js"></script>
<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('loginPanel').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signupPanel').classList.toggle('hidden', tab !== 'signup');
  clearErrors();
}

function showLogin() {
  document.getElementById('magicSent').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
}

function clearErrors() {
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('signupError').classList.add('hidden');
  document.getElementById('signupSuccess').classList.add('hidden');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function handleLogin() {
  clearErrors();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('loginError', 'Please enter email and password.'); return; }

  const btn = document.querySelector('#loginPanel .btn-primary');
  btn.textContent = 'Signing in...'; btn.disabled = true;

  try {
    await window.supabaseClient.signIn(email, password);
    // Auth state listener will handle redirect
  } catch (e) {
    showError('loginError', e.message || 'Login failed. Check your credentials.');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}

async function handleSignup() {
  clearErrors();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!email || !password) { showError('signupError', 'Please enter email and password.'); return; }
  if (password.length < 6) { showError('signupError', 'Password must be at least 6 characters.'); return; }

  const btn = document.querySelector('#signupPanel .btn-primary');
  btn.textContent = 'Creating account...'; btn.disabled = true;

  try {
    await window.supabaseClient.signUp(email, password);
    document.getElementById('signupPanel').classList.add('hidden');
    document.getElementById('signupSuccess').classList.remove('hidden');
  } catch (e) {
    showError('signupError', e.message || 'Signup failed.');
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
}

async function handleMagicLink() {
  clearErrors();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showError('loginError', 'Enter your email first.'); return; }

  try {
    await window.supabaseClient.signInWithMagicLink(email);
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('magicSent').classList.remove('hidden');
  } catch (e) {
    showError('loginError', e.message || 'Failed to send magic link.');
  }
}

// Listen for auth state changes
document.addEventListener('DOMContentLoaded', function() {
  if (!window.supabaseClient) {
    // Wait for supabase to load
    window.addEventListener('supabase-loaded', init);
  } else {
    init();
  }
});

function init() {
  // Check if user is already logged in
  window.supabaseClient.getUser().then(user => {
    if (user) {
      // Redirect to tracker with sync
      window.location.href = 'ftmo_challenge_tracker.html?sync=cloud';
    }
  });

  // Listen for auth state
  window.supabaseClient.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = 'ftmo_challenge_tracker.html?sync=cloud';
    }
  });
}
</script>
</body>
</html>
